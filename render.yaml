services:
  - type: web
    name: expenso-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt && alembic upgrade head
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expenso-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: expenso-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: worker
    name: expenso-worker
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && celery -A app.workers.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expenso-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: expenso-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: expenso-frontend
    runtime: static
    buildCommand: cd frontend && pnpm install && pnpm build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: expenso-db
    plan: starter
    databaseName: expenso_db
    user: expenso

  - name: expenso-redis
    plan: starter
